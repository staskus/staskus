name: Weekly summary
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  weekly-summary:
    name: Generate weekly summary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Gather activity and generate summary
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 <<'PYEOF'
          import json, os, re, urllib.request, time
          from datetime import datetime, timedelta, timezone

          gh_token = os.environ["GH_TOKEN"]
          openai_key = os.environ["OPENAI_API_KEY"]
          username = "staskus"
          now = datetime.now(timezone.utc)
          week_ago = (now - timedelta(days=7)).isoformat()

          # Gather public events from the last week
          events = []
          for page in range(1, 4):
              url = f"https://api.github.com/users/{username}/events/public?per_page=100&page={page}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {gh_token}",
                  "Accept": "application/vnd.github+json"
              })
              try:
                  with urllib.request.urlopen(req) as resp:
                      batch = json.loads(resp.read())
                      if not batch:
                          break
                      events.extend(batch)
              except Exception:
                  break

          # Filter to last 7 days
          recent = [e for e in events if e.get("created_at", "") >= week_ago]

          # Gather PR details for merged/opened PRs
          prs = []
          seen_prs = set()
          for e in recent:
              if e["type"] == "PullRequestEvent":
                  pr = e.get("payload", {}).get("pull_request", {})
                  pr_url = pr.get("html_url", "")
                  if pr_url and pr_url not in seen_prs:
                      seen_prs.add(pr_url)
                      prs.append({
                          "action": e["payload"].get("action", ""),
                          "title": pr.get("title", ""),
                          "url": pr_url,
                          "repo": e["repo"]["name"],
                          "body": (pr.get("body") or "")[:500]
                      })

          # Gather commit messages from push events
          commits = []
          for e in recent:
              if e["type"] == "PushEvent":
                  repo = e["repo"]["name"]
                  for c in e.get("payload", {}).get("commits", []):
                      msg = c.get("message", "").split("\n")[0]
                      if msg and "bot" not in msg.lower() and "merge" not in msg.lower():
                          commits.append({"repo": repo, "message": msg})

          # Gather issue comments
          comments = []
          for e in recent:
              if e["type"] == "IssueCommentEvent":
                  comments.append({
                      "repo": e["repo"]["name"],
                      "issue_title": e.get("payload", {}).get("issue", {}).get("title", ""),
                      "body": (e.get("payload", {}).get("comment", {}).get("body") or "")[:300]
                  })

          # Build activity context
          activity = {
              "period": f"{(now - timedelta(days=7)).strftime('%b %d')} - {now.strftime('%b %d, %Y')}",
              "pull_requests": prs[:20],
              "commits": commits[:40],
              "comments": comments[:10]
          }

          activity_json = json.dumps(activity, indent=2)
          print(f"Collected: {len(prs)} PRs, {len(commits)} commits, {len(comments)} comments")

          if not prs and not commits:
              print("No activity this week, skipping.")
              import sys
              sys.exit(0)

          # Call OpenAI
          prompt = f"""You are writing a short weekly dev log for a GitHub profile README.
          Based on the activity data below, write a concise, engaging summary (3-6 sentences) of what
          this developer worked on this week. Write in first person. Sound like a developer blog post -
          highlight the most interesting technical work, mention specific features or fixes that stand out,
          and call out any patterns (e.g. cross-platform work, new projects). Skip mundane details like
          merge commits or bot activity. Do not use em dashes. Do not use emojis. Keep it natural and
          conversational. Output only the summary text, no headers or formatting.

          Activity data:
          {activity_json}"""

          body = json.dumps({
              "model": "o3",
              "input": [{"role": "user", "content": prompt}],
              "max_output_tokens": 500
          }).encode()

          req = urllib.request.Request(
              "https://api.openai.com/v1/responses",
              data=body,
              headers={
                  "Authorization": f"Bearer {openai_key}",
                  "Content-Type": "application/json"
              }
          )

          with urllib.request.urlopen(req, timeout=60) as resp:
              result = json.loads(resp.read())

          summary = result["output"][0]["content"][0]["text"].strip()
          print(f"Summary: {summary}")

          # Update README
          with open("README.md", "r") as f:
              content = f.read()
          pattern = r"(<!-- WEEKLY-SUMMARY:START -->).*?(<!-- WEEKLY-SUMMARY:END -->)"
          replacement = f"\\1\n{summary}\n\\2"
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && exit 0
          git add README.md
          git commit -m "Update weekly summary"
          git push
