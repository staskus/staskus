name: Recent repos
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-recent-repos:
    name: Update README with recent repos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch recent repos and update README
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          python3 <<'PYEOF'
          import json, os, re, urllib.request, time
          from datetime import datetime, timedelta, timezone
          from collections import Counter

          token = os.environ["GH_TOKEN"]
          username = "staskus"
          blocked_orgs = {"notmattpress"}

          def fetch_repos(since_date):
              repo_commits = Counter()
              page = 1
              while True:
                  url = (
                      f"https://api.github.com/search/commits"
                      f"?q=author:{username}+committer-date:>{since_date}+is:public"
                      f"&per_page=100&page={page}&sort=committer-date"
                  )
                  req = urllib.request.Request(url, headers={
                      "Authorization": f"token {token}",
                      "Accept": "application/vnd.github+json"
                  })
                  try:
                      with urllib.request.urlopen(req) as resp:
                          data = json.loads(resp.read())
                          items = data.get("items", [])
                          if not items:
                              break
                          for item in items:
                              repo = item.get("repository", {}).get("full_name", "")
                              if repo:
                                  org = repo.split("/")[0]
                                  if org not in blocked_orgs:
                                      repo_commits[repo] += 1
                          if len(items) < 100:
                              break
                          page += 1
                          if page > 10:
                              break
                          time.sleep(2)
                  except Exception as e:
                      print(f"Error on page {page}: {e}")
                      break
              return repo_commits

          since_2y = (datetime.now(timezone.utc) - timedelta(days=730)).strftime("%Y-%m-%d")
          since_6m = (datetime.now(timezone.utc) - timedelta(days=180)).strftime("%Y-%m-%d")

          all_repos = fetch_repos(since_2y)
          personal_repos = fetch_repos(since_6m)

          contrib = [(r, c) for r, c in all_repos.most_common() if not r.startswith("staskus/")]
          own = [(r, c) for r, c in personal_repos.most_common() if r.startswith("staskus/") and r != "staskus/staskus"]

          contrib_emojis = ["🏢", "🤝", "🌍", "🔩", "📋", "🛡", "📊", "🔗", "🧱", "💡"]
          own_emojis = ["🚀", "📱", "🔬", "⚡", "🧩", "🎯", "🔧", "📦", "🌐", "🛠"]

          lines = ["**Open Source**", ""]
          for i, (repo, count) in enumerate(contrib):
              emoji = contrib_emojis[i % len(contrib_emojis)]
              lines.append(f"- {emoji} [{repo}](https://github.com/{repo})")

          if own:
              lines.extend(["", "**Personal**", ""])
              for i, (repo, count) in enumerate(own):
                  emoji = own_emojis[i % len(own_emojis)]
                  lines.append(f"- {emoji} [{repo}](https://github.com/{repo})")

          table = "\n".join(lines)

          with open("README.md", "r") as f:
              content = f.read()
          pattern = r"(<!-- RECENT-REPOS:START -->).*?(<!-- RECENT-REPOS:END -->)"
          replacement = f"\\1\n{table}\n\\2"
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open("README.md", "w") as f:
              f.write(content)

          print(f"Open Source: {len(contrib)} repos, Personal: {len(own)} repos")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && exit 0
          git add README.md
          git commit -m "Update recent repos section"
          git push
