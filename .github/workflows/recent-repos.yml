name: Recent repos
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-recent-repos:
    name: Update README with recent repos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch recent repos and update README
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          python3 <<'PYEOF'
          import json, os, re, urllib.request
          from datetime import datetime, timedelta, timezone

          token = os.environ["GH_TOKEN"]
          username = "staskus"
          since = (datetime.now(timezone.utc) - timedelta(days=90)).isoformat()

          # Fetch public events (up to 10 pages)
          events = []
          for page in range(1, 11):
              url = f"https://api.github.com/users/{username}/events/public?per_page=100&page={page}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github+json"
              })
              try:
                  with urllib.request.urlopen(req) as resp:
                      batch = json.loads(resp.read())
                      if not batch:
                          break
                      events.extend(batch)
              except Exception:
                  break

          # Count commits per repo from PushEvents
          repo_commits = {}
          for event in events:
              if event.get("type") != "PushEvent":
                  continue
              if event.get("created_at", "") < since:
                  continue
              repo = event.get("repo", {}).get("name", "")
              if not repo:
                  continue
              commits = len(event.get("payload", {}).get("commits", []))
              repo_commits[repo] = repo_commits.get(repo, 0) + commits

          # Sort by commits descending, take top 10
          sorted_repos = sorted(repo_commits.items(), key=lambda x: -x[1])[:10]

          # Build markdown table
          lines = ["| Repository | Commits (90d) |", "|---|---|"]
          for repo, count in sorted_repos:
              lines.append(f"| [{repo}](https://github.com/{repo}) | {count} |")
          table = "\n".join(lines)

          # Update README
          with open("README.md", "r") as f:
              content = f.read()
          pattern = r"(<!-- RECENT-REPOS:START -->).*?(<!-- RECENT-REPOS:END -->)"
          replacement = f"\\1\n{table}\n\\2"
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open("README.md", "w") as f:
              f.write(content)

          print(f"Found {len(sorted_repos)} repos with commits in the last 90 days")
          for repo, count in sorted_repos:
              print(f"  {repo}: {count}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && exit 0
          git add README.md
          git commit -m "Update recent repos section"
          git push
